<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Generator haseł</title>
  </head>
  <body>
    <main>
      <h1>Wygeneruj losowe hasło</h1>
      <p>
        Wygeneruj losowy ciąg znaków, który możesz zastosować jako własne hasło.
        Gwarantuję, że będzie silne i bardzo trudne do złamania.
      </p>
    </main>
    <aside>
      <form action="">
        <p class="input">
          Wybierz długość hasła:&nbsp;<input class="lenght" type="number" />
        </p>
        <p class="input">
          Wybierz ilość wygenerowanych haseł:&nbsp;<input
            class="many"
            type="number"
          />
        </p>
      </form>
      <button>Wygeneruj swoje hasło</button>
      <section></section>
    </aside>
    <script src="main.js"></script>
  </body>
</html>
